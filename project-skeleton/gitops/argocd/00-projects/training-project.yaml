  # Proyecto base para agrupar las aplicaciones de la practica.
  name: training-project
  namespace: argocd
spec:
  description: Proyecto GitOps del stack de formacion
  sourceRepos:
    # TODO ejercicio 3:
    # Sustituir por la URL del repositorio Git que actua como fuente de verdad.
    - https://github.com/erodrigue598/devops-ejernv.git
